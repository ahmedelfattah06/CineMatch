{% extends 'base.html' %}
{% block title %}Register — CineMatch{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/register">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" autocomplete="new-password" required>
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>
        <div class="auth-link">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
</div>
{% endblock %}
