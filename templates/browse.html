{% extends "base.html" %}
{% block title %}Browse Movies — CineMatch{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1 class="page-title">Browse Movies</h1>

        <!-- Filters -->
        <div class="filters-panel">
            <div class="filter-row">
                <div class="filter-group">
                    <label>Genre</label>
                    <select id="filterGenre">
                        <option value="">All Genres</option>
                        {% for g in genres %}
                        <option value="{{ g }}">{{ g }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="filter-group">
                    <label>Classification</label>
                    <select id="filterClass">
                        <option value="">All</option>
                        <option value="Excellent">Excellent</option>
                        <option value="Good">Good</option>
                        <option value="Poor">Poor</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Country</label>
                    <select id="filterCountry">
                        <option value="">All Countries</option>
                        {% for c in countries %}
                        <option value="{{ c }}">{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="filter-group">
                    <label>Sort By</label>
                    <select id="filterSort">
                        <option value="weighted_score">Weighted Score</option>
                        <option value="score">IMDb Score</option>
                        <option value="year">Year</option>
                        <option value="votes">Votes</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-group range-group">
                    <label>Year: <span id="yearLabel">{{ min_year }} – {{ max_year }}</span></label>
                    <div class="range-row">
                        <input type="range" id="yearMin" min="{{ min_year }}" max="{{ max_year }}" value="{{ min_year }}" step="1">
                        <input type="range" id="yearMax" min="{{ min_year }}" max="{{ max_year }}" value="{{ max_year }}" step="1">
                    </div>
                </div>
                <div class="filter-group range-group">
                    <label>Score: <span id="scoreLabel">1.0 – 10.0</span></label>
                    <div class="range-row">
                        <input type="range" id="scoreMin" min="1" max="10" value="1" step="0.1">
                        <input type="range" id="scoreMax" min="1" max="10" value="10" step="0.1">
                    </div>
                </div>
                <div class="filter-group search-group">
                    <label>Search</label>
                    <input type="text" id="filterSearch" placeholder="Movie, actor, director...">
                </div>
                <div class="filter-group">
                    <label>&nbsp;</label>
                    <button onclick="applyFilters(1)" class="btn btn-primary">Apply Filters</button>
                </div>
            </div>
        </div>

        <!-- Results Info -->
        <div class="results-info" id="resultsInfo">Loading movies...</div>

        <!-- Movie Grid -->
        <div class="movie-grid" id="movieGrid"></div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

// Read URL params on load
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('genre')) document.getElementById('filterGenre').value = urlParams.get('genre');
if (urlParams.get('search')) document.getElementById('filterSearch').value = urlParams.get('search');

function applyFilters(page) {
    currentPage = page || 1;
    const genre = document.getElementById('filterGenre').value;
    const cls = document.getElementById('filterClass').value;
    const country = document.getElementById('filterCountry').value;
    const sort = document.getElementById('filterSort').value;
    const yearMin = document.getElementById('yearMin').value;
    const yearMax = document.getElementById('yearMax').value;
    const scoreMin = document.getElementById('scoreMin').value;
    const scoreMax = document.getElementById('scoreMax').value;
    const search = document.getElementById('filterSearch').value.trim();

    const params = new URLSearchParams({
        genre, classification: cls, country, sort,
        year_min: yearMin, year_max: yearMax,
        score_min: scoreMin, score_max: scoreMax,
        search, page: currentPage
    });

    document.getElementById('movieGrid').innerHTML = '<div class="loading">Loading...</div>';

    fetch('/data/movies?' + params.toString())
        .then(r => r.json())
        .then(data => renderMovies(data));
}

function renderMovies(data) {
    const grid = document.getElementById('movieGrid');
    const info = document.getElementById('resultsInfo');
    info.textContent = `Showing ${data.movies.length} of ${data.total.toLocaleString()} movies`;

    if (!data.movies.length) {
        grid.innerHTML = '<div class="empty-state">No movies found. Try adjusting filters.</div>';
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    grid.innerHTML = data.movies.map(m => `
        <a href="/movie/${m.movie_id}" class="movie-card">
            <div class="card-top">
                <span class="score-badge ${m.score >= 8 ? 'score-green' : m.score >= 6 ? 'score-yellow' : 'score-red'}">
                    ⭐ ${m.score}
                </span>
                <span class="class-badge class-${m.classification.toLowerCase()}">${m.classification}</span>
            </div>
            <div class="card-body">
                <h3 class="card-title">${m.name}</h3>
                <div class="card-meta">
                    <span class="card-genre">${m.genre}</span>
                    <span class="card-year">${m.year}</span>
                </div>
                <div class="card-star">${m.star}</div>
            </div>
        </a>
    `).join('');

    renderPagination(data.page, data.total_pages);
}

function renderPagination(current, total) {
    const pag = document.getElementById('pagination');
    if (total <= 1) { pag.innerHTML = ''; return; }
    let html = '';
    if (current > 1) html += `<button onclick="applyFilters(${current - 1})" class="page-btn">← Prev</button>`;
    const start = Math.max(1, current - 2);
    const end = Math.min(total, current + 2);
    for (let i = start; i <= end; i++) {
        html += `<button onclick="applyFilters(${i})" class="page-btn ${i === current ? 'active' : ''}">${i}</button>`;
    }
    if (current < total) html += `<button onclick="applyFilters(${current + 1})" class="page-btn">Next →</button>`;
    pag.innerHTML = html;
}

// Range label updates
['yearMin', 'yearMax'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        const min = document.getElementById('yearMin').value;
        const max = document.getElementById('yearMax').value;
        document.getElementById('yearLabel').textContent = `${min} – ${max}`;
    });
});
['scoreMin', 'scoreMax'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        const min = parseFloat(document.getElementById('scoreMin').value).toFixed(1);
        const max = parseFloat(document.getElementById('scoreMax').value).toFixed(1);
        document.getElementById('scoreLabel').textContent = `${min} – ${max}`;
    });
});

// Trigger on enter in search
document.getElementById('filterSearch').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilters(1);
});

// Auto-apply on select change
['filterGenre', 'filterClass', 'filterCountry', 'filterSort'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => applyFilters(1));
});

// Initial load
applyFilters(1);
</script>
{% endblock %}
